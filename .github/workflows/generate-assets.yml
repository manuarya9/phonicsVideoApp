name: Generate Phonics Assets

on:
  push:
    paths:
      - "generator/**"
      - "generator/data/**"
      - "assets/images/**"
      - ".github/workflows/generate-assets.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: pip install -r generator/requirements.txt

      - name: Generate videos and metadata
        env:
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
          RUNWAY_MODEL: ${{ vars.RUNWAY_MODEL || 'gen4_turbo' }}
        run: python generator/generate_assets.py --force

      - name: Open pull request with generated assets
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/generated-phonics-assets
          commit-message: "chore: refresh generated phonics assets"
          title: "Refresh generated phonics assets"
          body: |
            Automated asset refresh triggered by updates to `generator/data` or `assets/images`.

            This PR includes newly generated videos and metadata from Runway.
          add-paths: |
            assets/videos
            assets/audio/generated
            assets/metadata
